name: Build & Release

# 推送形如 v1.0.0 的 tag 时触发；也可在 Actions 页手动触发
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # 创建 Release 需要写权限

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # 计算发布版本号：打 tag 时用 tag 名；手动触发时自动生成一个带日期和构建号的版本，
      # 以便 softprops/action-gh-release 自动创建该 tag（否则手动触发会报 "requires a tag"）。
      - name: Resolve version
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=v0.0.0-$(date +%Y%m%d)-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (standalone)
        run: pnpm build

      # 组装可在 Windows 本地直接运行的发布包：
      # standalone 自带精简 node_modules 与 server.js，再补上 static 与 public 静态资源。
      - name: Assemble release bundle
        run: |
          set -e
          DIST=release/kb-ai
          mkdir -p "$DIST"
          cp -r .next/standalone/. "$DIST/"
          mkdir -p "$DIST/.next"
          cp -r .next/static "$DIST/.next/static"
          if [ -d public ]; then cp -r public "$DIST/public"; fi

          # Next 16/Turbopack 的 standalone 依赖追踪偶尔会漏掉运行时必需的包
          # （典型：@swc/helpers、tslib），导致本地启动报 "Cannot find module"。
          # 注意：pnpm 用 .pnpm 软链结构，顶层 node_modules 不含间接依赖，
          # 因此需从 .pnpm store 里按 glob 解析真实路径再补齐。
          ensure_pkg() {
            local pkg="$1"            # 例如 @swc/helpers
            local store_name="$2"     # .pnpm 目录名前缀，例如 @swc+helpers
            if [ -d "$DIST/node_modules/$pkg" ]; then return 0; fi
            # 优先用顶层（npm/yarn 扁平结构），否则回退 pnpm store
            local src=""
            if [ -d "node_modules/$pkg" ]; then
              src="node_modules/$pkg"
            else
              src=$(ls -d node_modules/.pnpm/${store_name}@*/node_modules/$pkg 2>/dev/null | head -1)
            fi
            if [ -n "$src" ] && [ -d "$src" ]; then
              echo "Backfilling missing dependency: $pkg (from $src)"
              mkdir -p "$DIST/node_modules/$(dirname "$pkg")"
              cp -rL "$src" "$DIST/node_modules/$pkg"
            fi
          }
          ensure_pkg "@swc/helpers" "@swc+helpers"
          ensure_pkg "tslib" "tslib"
          ensure_pkg "styled-jsx" "styled-jsx"

          # 兜底校验：确认报错涉及的关键模块确实已就位，否则让构建失败而不是发出坏包。
          if [ ! -f "$DIST/node_modules/@swc/helpers/package.json" ]; then
            echo "ERROR: @swc/helpers missing from release bundle" >&2
            exit 1
          fi

          # Windows 一键启动脚本（双击运行）。默认端口 3000，可用 set PORT=xxxx 覆盖。
          # 注意：脚本内容必须全为 ASCII 英文。cmd.exe 按本地代码页逐字节解析 .bat，
          # 中文字符会被当成命令导致报错（如 'tart' is not recognized），因此一律用英文。
          cat > "$DIST/start.bat" << 'EOF'
          @echo off
          setlocal
          rem Switch to the script's own folder so server.js can be found on double-click.
          cd /d "%~dp0"

          rem Check Node.js is installed and on PATH.
          where node >nul 2>nul
          if errorlevel 1 (
            echo.
            echo [ERROR] Node.js was not found.
            echo Please install Node.js 20+ from https://nodejs.org and run this again.
            echo.
            pause
            exit /b 1
          )

          if "%PORT%"=="" set PORT=3000
          set HOSTNAME=127.0.0.1

          rem Make sure server.js exists.
          if not exist "server.js" (
            echo.
            echo [ERROR] server.js not found. Please fully extract the zip, then run this script.
            echo Current folder: %CD%
            echo.
            pause
            exit /b 1
          )

          echo Starting KB-AI at http://127.0.0.1:%PORT%
          echo The browser will open automatically. If not, open the URL above.
          echo Close this window to stop the server.
          echo.

          rem Open the browser after a short delay so the server is ready.
          start "" /b cmd /c "timeout /t 3 >nul & start "" http://127.0.0.1:%PORT%"

          node server.js
          set EXITCODE=%errorlevel%
          if not "%EXITCODE%"=="0" (
            echo.
            echo [ERROR] Server exited with code %EXITCODE%. Please screenshot the messages above.
            echo.
            pause
          )
          endlocal
          EOF

          # 跨平台启动脚本（macOS / Linux）
          cat > "$DIST/start.sh" << 'EOF'
          #!/usr/bin/env bash
          export PORT="${PORT:-3000}"
          export HOSTNAME="127.0.0.1"
          echo "Starting KB-AI on http://127.0.0.1:$PORT"
          node server.js
          EOF
          chmod +x "$DIST/start.sh"

          # 使用说明
          cat > "$DIST/README.txt" << 'EOF'
          KB-AI 本地知识库 — 运行说明
          =================================

          前置要求：本机已安装 Node.js 20+ 与 Git。

          Windows：
            1. 解压本压缩包
            2. 双击 start.bat（会自动打开浏览器）
            3. 如需更换端口：先在命令行执行  set PORT=8080  再运行 start.bat

          macOS / Linux：
            1. 解压本压缩包
            2. 终端执行  ./start.sh

          首次使用：打开页面后点击右上角「设置」配置并测试你的第三方 API（端点、密钥、模型）。

          数据存放：知识库数据写在你新建库时指定的目录；应用配置写在运行目录下的 .kb-data/ 内。
          EOF

      - name: Create zip
        run: |
          cd release
          zip -r "../kb-ai-${{ steps.ver.outputs.version }}.zip" kb-ai
          cd ..

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: KB-AI ${{ steps.ver.outputs.version }}
          files: kb-ai-*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
