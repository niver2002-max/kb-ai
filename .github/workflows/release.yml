name: Build & Release

# 推送形如 v1.0.0 的 tag 时触发；也可在 Actions 页手动触发
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # 创建 Release 需要写权限

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # 计算发布版本号：打 tag 时用 tag 名；手动触发时自动生成一个带日期和构建号的版本，
      # 以便 softprops/action-gh-release 自动创建该 tag（否则手动触发会报 "requires a tag"）。
      - name: Resolve version
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=v0.0.0-$(date +%Y%m%d)-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (standalone)
        run: pnpm build

      # 组装可在 Windows 本地直接运行的发布包：
      # standalone 自带精简 node_modules 与 server.js，再补上 static 与 public 静态资源。
      - name: Assemble release bundle
        run: |
          set -e
          DIST=release/kb-ai
          mkdir -p "$DIST"
          cp -r .next/standalone/. "$DIST/"
          mkdir -p "$DIST/.next"
          cp -r .next/static "$DIST/.next/static"
          if [ -d public ]; then cp -r public "$DIST/public"; fi

          # Windows 一键启动脚本（双击运行）。默认端口 3000，可用 set PORT=xxxx 覆盖。
          # 关键：切到脚本目录、检测 Node、出错暂停，避免“闪一下就消失”看不到原因。
          cat > "$DIST/start.bat" << 'EOF'
          @echo off
          chcp 65001 >nul
          setlocal
          rem 切换到脚本所在目录，确保能找到 server.js（双击运行时工作目录可能不对）
          cd /d "%~dp0"

          rem 检测 Node 是否已安装并在 PATH 中
          where node >nul 2>nul
          if errorlevel 1 (
            echo.
            echo [错误] 未检测到 Node.js。
            echo 请先到 https://nodejs.org 下载安装 Node.js 20 或更高版本，安装后重新运行本程序。
            echo.
            pause
            exit /b 1
          )

          if "%PORT%"=="" set PORT=3000
          set HOSTNAME=127.0.0.1

          rem 确认 server.js 存在
          if not exist "server.js" (
            echo.
            echo [错误] 未找到 server.js，请确认已将压缩包完整解压后再运行本脚本。
            echo 当前目录：%CD%
            echo.
            pause
            exit /b 1
          )

          echo 正在启动 KB-AI，地址： http://127.0.0.1:%PORT%
          echo 启动后浏览器会自动打开；如未打开，请手动访问上面的地址。
          echo 关闭本窗口即可停止服务。
          echo.

          rem 延迟几秒再打开浏览器，等服务器就绪
          start "" /b cmd /c "timeout /t 3 >nul & start "" http://127.0.0.1:%PORT%"

          node server.js
          set EXITCODE=%errorlevel%
          if not "%EXITCODE%"=="0" (
            echo.
            echo [错误] 服务异常退出，错误码 %EXITCODE%。请将以上信息截图反馈。
            echo.
            pause
          )
          endlocal
          EOF

          # 跨平台启动脚本（macOS / Linux）
          cat > "$DIST/start.sh" << 'EOF'
          #!/usr/bin/env bash
          export PORT="${PORT:-3000}"
          export HOSTNAME="127.0.0.1"
          echo "Starting KB-AI on http://127.0.0.1:$PORT"
          node server.js
          EOF
          chmod +x "$DIST/start.sh"

          # 使用说明
          cat > "$DIST/README.txt" << 'EOF'
          KB-AI 本地知识库 — 运行说明
          =================================

          前置要求：本机已安装 Node.js 20+ 与 Git。

          Windows：
            1. 解压本压缩包
            2. 双击 start.bat（会自动打开浏览器）
            3. 如需更换端口：先在命令行执行  set PORT=8080  再运行 start.bat

          macOS / Linux：
            1. 解压本压缩包
            2. 终端执行  ./start.sh

          首次使用：打开页面后点击右上角「设置」配置并测试你的第三方 API（端点、密钥、模型）。

          数据存放：知识库数据写在你新建库时指定的目录；应用配置写在运行目录下的 .kb-data/ 内。
          EOF

      - name: Create zip
        run: |
          cd release
          zip -r "../kb-ai-${{ steps.ver.outputs.version }}.zip" kb-ai
          cd ..

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: KB-AI ${{ steps.ver.outputs.version }}
          files: kb-ai-*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
