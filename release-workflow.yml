# ⚠️ 放置说明：把本文件移动到 .github/workflows/release.yml 后才会生效。
# （v0 的 GitHub App 没有 workflows 权限，无法直接创建该路径，故先放在仓库根目录。）
# 操作：在本地仓库执行
#   mkdir -p .github/workflows && git mv release-workflow.yml .github/workflows/release.yml
#   git commit -m "ci: add release workflow" && git push
# 之后推送形如 v1.0.0 的 tag 即可自动构建并发布 Release。

name: Build & Release

# 推送形如 v1.0.0 的 tag 时触发；也可在 Actions 页手动触发
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # 创建 Release 需要写权限

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (standalone)
        run: pnpm build

      # 组装可在 Windows 本地直接运行的发布包：
      # standalone 自带精简 node_modules 与 server.js，再补上 static 与 public 静态资源。
      - name: Assemble release bundle
        run: |
          set -e
          DIST=release/kb-ai
          mkdir -p "$DIST"
          cp -r .next/standalone/. "$DIST/"
          mkdir -p "$DIST/.next"
          cp -r .next/static "$DIST/.next/static"
          if [ -d public ]; then cp -r public "$DIST/public"; fi

          # Windows 一键启动脚本（双击运行）。默认端口 3000，可用 set PORT=xxxx 覆盖。
          cat > "$DIST/start.bat" << 'EOF'
          @echo off
          setlocal
          if "%PORT%"=="" set PORT=3000
          set HOSTNAME=127.0.0.1
          echo Starting KB-AI on http://127.0.0.1:%PORT%
          start "" http://127.0.0.1:%PORT%
          node server.js
          endlocal
          EOF

          # 跨平台启动脚本（macOS / Linux）
          cat > "$DIST/start.sh" << 'EOF'
          #!/usr/bin/env bash
          export PORT="${PORT:-3000}"
          export HOSTNAME="127.0.0.1"
          echo "Starting KB-AI on http://127.0.0.1:$PORT"
          node server.js
          EOF
          chmod +x "$DIST/start.sh"

          # 使用说明
          cat > "$DIST/README.txt" << 'EOF'
          KB-AI 本地知识库 — 运行说明
          =================================

          前置要求：本机已安装 Node.js 20+ 与 Git。

          Windows：
            1. 解压本压缩包
            2. 双击 start.bat（会自动打开浏览器）
            3. 如需更换端口：先在命令行执行  set PORT=8080  再运行 start.bat

          macOS / Linux：
            1. 解压本压缩包
            2. 终端执行  ./start.sh

          首次使用：打开页面后点击右上角「设置」配置并测试你的第三方 API（端点、密钥、模型）。

          数据存放：知识库数据写在你新建库时指定的目录；应用配置写在运行目录下的 .kb-data/ 内。
          EOF

      - name: Create zip
        run: |
          cd release
          zip -r "../kb-ai-${GITHUB_REF_NAME}.zip" kb-ai
          cd ..

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: kb-ai-*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
